name = "distillery-v0"
main = "src/index.ts"
compatibility_date = "2026-07-06"

[vars]
OPENROUTER_BASE_URL = "https://openrouter.ai/api/v1"
OPENROUTER_MODEL = "openai/gpt-5"
OPENROUTER_FALLBACK_MODELS = "anthropic/claude-sonnet-4.5,moonshotai/kimi-k2.7-code,~moonshotai/kimi-latest"
OPENROUTER_TIMEOUT_MS = "60000"
OPENROUTER_FALLBACK_TIMEOUT_MS = "45000"
EMBEDDING_PROVIDER = "openrouter"
EMBEDDING_BASE_URL = "https://openrouter.ai/api/v1"
EMBEDDING_MODEL = "google/gemini-embedding-001"
EMBEDDING_DIMENSIONS = "1536"
EMBEDDING_ENCODING_FORMAT = "float"

[[queues.producers]]
binding = "MEMORY_GENERATION_QUEUE"
queue = "distillery-memory-generation"

[[queues.consumers]]
queue = "distillery-memory-generation"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 5
max_concurrency = 3

[triggers]
crons = ["*/1 * * * *"]

[observability]
enabled = true
head_sampling_rate = 1
