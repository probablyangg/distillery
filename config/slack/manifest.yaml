_metadata:
  major_version: 2
  minor_version: 1
display_information:
  name: Distillery
  description: Save bounded, evidence-backed Slack conversation context to Distillery.
  background_color: "#070b12"
features:
  bot_user:
    display_name: Distillery
    always_online: false
  shortcuts:
    - name: Save to Distillery
      type: message
      callback_id: save_to_distillery
      description: Save this message with bounded thread or nearby context as evidence.
oauth_config:
  scopes:
    bot:
      - channels:history
      - channels:read
      - commands
      - files:read
      - groups:history
      - groups:read
      - reactions:write
      - users:read
settings:
  interactivity:
    is_enabled: true
    request_url: https://distillery-v0.angela-f4b.workers.dev/api/slack/interactions
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
